version: "3.9"

services:
    web:
        build: .
        container_name: pythonblog-tekken
        ports:
            - "5000:5000"
        volumes:
            # Mount instance directory for SQLite database persistence
            - ./instance:/app/instance
            # Optional: Mount static files for development
            - ./pythonblog/static:/app/pythonblog/static
            - ./pythonblog/templates:/app/pythonblog/templates
        environment:
            # Load environment variables from .env file
            - FLASK_ENV=${FLASK_ENV:-production}
            - FLASK_APP=${FLASK_APP:-run.py}
            - SECRET_KEY=${SECRET_KEY}
            - SQLALCHEMY_DATABASE_URI=${SQLALCHEMY_DATABASE_URI:-sqlite:////app/instance/site.db}
            - MAIL_SERVER=${MAIL_SERVER}
            - MAIL_PORT=${MAIL_PORT}
            - MAIL_USE_TLS=${MAIL_USE_TLS}
            - MAIL_USERNAME=${MAIL_USERNAME}
            - MAIL_PASSWORD=${MAIL_PASSWORD}
            - MY_GMAIL=${MY_GMAIL}
            - DEBUG=${DEBUG:-False}
        restart: unless-stopped
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:5000/about"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 10s

    # Optional: Add volume for database backups
volumes:
    instance:
        driver: local
