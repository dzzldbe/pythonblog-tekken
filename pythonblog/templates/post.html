{% extends "layout.html" %}
{%block content %}

<article class="media content-section">
<img class="rounded-circle article-img" src="{{ url_for('static', filename='profile_pics/' + post.author.image_file) }}">
<div class="media-body">
     <div class="article-metadata">
     <a class="mr-2" href="{{ url_for('users.user_posts', username=post.author.username) }}">{{ post.author.username }}</a>
     <small class="text-muted">{{ post.date_posted.strftime('%a %d %b %Y, %I:%M%p') }}</small>
     </div>
     <h2 class=" article-title">{{ post.title }}</h2>
     <p class="article-content">{{ post.content }}</p>
     {% if post.author == current_user %}
          <div>
               <button type="button" class="btn btn-sm btn-outline-danger m-1" data-bs-toggle="modal" data-bs-target="#delete_modal">
                    Delete
               </button>
               <a class="btn btn-outline-info btn-sm m-1" href="{{ url_for('posts.update', id=post.id) }}">Update</a>
          </div>

     {% endif %}
     
</div>
     
</article>  

<div class="modal fade" id="delete_modal" tabindex="-1" aria-labelledby="delete_modalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h1 class="modal-title fs-5" id="delete_modalLabel">Delete Post?</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        <form action="{{ url_for('posts.delete_post', id=post.id) }}" method="POST">
          <input type="submit" class="btn btn-danger" value="Delete">
        </form>
      </div>
    </div>
  </div>
</div>

{% endblock content %}
